<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;width:100%}
body{font-family:'Josefin Sans',sans-serif;background:#13100a;color:#F0E6D0;overflow-x:hidden}
:root{--gold:#C9A050;--parchment:#F0E6D0;--muted:#9A8A70;--deep:#7A6A50;--card-bg:rgba(22,15,6,0.92);--danger:#C85040;--venmo:#008CFF;--paypal:#003087;}
.scene{min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;position:relative;
background:
  radial-gradient(ellipse at 70% 20%, rgba(160,90,20,0.28) 0%, transparent 55%),
  radial-gradient(ellipse at 20% 80%, rgba(100,55,10,0.18) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(25,16,6,1) 0%, rgba(18,11,4,1) 60%, rgba(12,8,3,1) 100%);}
.scene-bg{display:none;}
/* Soft edge diffusion — feathers image into dark bg on all sides */
.scene-overlay{display:none;}

.step{position:relative;z-index:10;width:100%;max-width:540px;transition:opacity .38s ease,transform .38s ease;}
.step.fade-out{opacity:0;transform:translateY(20px);}
.step.fade-in{opacity:1;transform:translateY(0);}
.wordmark{font-size:10px;font-weight:300;letter-spacing:.45em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:2.75rem;}
.progress{display:flex;gap:5px;margin-bottom:2.75rem;}
.progress-seg{height:1.5px;flex:1;background:rgba(201,160,80,0.15);transition:background .5s ease;}
.progress-seg.active{background:var(--gold);}
.headline{font-family:'Cormorant Garamond',serif;font-size:clamp(2.1rem,5.5vw,3rem);font-weight:300;line-height:1.12;text-align:center;color:var(--parchment);margin-bottom:.5rem;}
.headline em{font-style:italic;color:var(--gold);}
.subline{font-size:10px;letter-spacing:.28em;color:var(--muted);text-align:center;text-transform:uppercase;margin-bottom:2.5rem;}
.product-card{border:1px solid rgba(201,160,80,0.18);background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:1.5rem;margin-bottom:1.25rem;}
.product-hero{width:100%;height:240px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;position:relative;overflow:hidden;background:#0a0704;}
.bottle-img{height:220px;width:auto;object-fit:contain;position:relative;z-index:2;filter:drop-shadow(0 8px 32px rgba(0,0,0,0.7));}
.hero-glow-frey{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(201,140,40,0.14) 0%,transparent 65%);z-index:1;}
.hero-glow-mugen{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(200,60,60,0.08) 0%,transparent 65%);z-index:1;}
.product-eyebrow{font-size:9px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;}
.product-name{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:400;color:var(--parchment);margin-bottom:.2rem;line-height:1.2;}
.product-price{font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:.85rem;}
.product-desc{font-size:13px;line-height:1.75;color:var(--muted);}
.qty-grid{display:grid;gap:.45rem;margin:1.35rem 0 0;}
.qty-btn{width:100%;padding:.85rem 1.1rem;border:1px solid rgba(201,160,80,0.2);background:rgba(201,160,80,0.03);color:var(--gold);font-family:'Josefin Sans',sans-serif;font-size:12.5px;font-weight:400;letter-spacing:.1em;cursor:pointer;transition:all .22s ease;display:flex;justify-content:space-between;align-items:center;text-align:left;}
.qty-btn:hover:not(.qs){background:rgba(201,160,80,0.07);border-color:rgba(201,160,80,0.5);}
.qty-btn.qs{background:rgba(201,160,80,0.13);border-color:var(--gold);color:var(--parchment);}
.qty-detail{font-size:11px;color:var(--deep);font-weight:300;letter-spacing:.05em;}
.qty-btn.qs .qty-detail{color:var(--gold);}
.qty-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:1.35rem 0 0;}
.qb2{padding:.85rem .5rem;border:1px solid rgba(201,160,80,0.2);background:rgba(201,160,80,0.03);color:var(--gold);font-family:'Josefin Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:.1em;cursor:pointer;transition:all .22s ease;text-align:center;}
.qb2:hover:not(.qs){background:rgba(201,160,80,0.07);border-color:rgba(201,160,80,0.5);}
.qb2.qs{background:rgba(201,160,80,0.13);border-color:var(--gold);color:var(--parchment);}
.delivery-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-bottom:1rem;}
.dbtn{padding:1.1rem .75rem;border:1px solid rgba(201,160,80,0.2);background:rgba(201,160,80,0.03);color:var(--gold);font-family:'Josefin Sans',sans-serif;cursor:pointer;transition:all .22s ease;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.35rem;}
.dbtn:hover:not(.qs){background:rgba(201,160,80,0.07);border-color:rgba(201,160,80,0.5);}
.dbtn.qs{background:rgba(201,160,80,0.13);border-color:var(--gold);color:var(--parchment);}
.dbtn-icon{font-size:22px;line-height:1;}
.dbtn-label{font-size:12px;font-weight:600;letter-spacing:.12em;}
.dbtn-sub{font-size:9px;letter-spacing:.08em;color:var(--deep);}
.dbtn.qs .dbtn-sub{color:var(--gold);}
.pickup-box{border:1px solid rgba(201,160,80,0.35);background:rgba(201,160,80,0.07);padding:1rem 1.1rem;margin:1rem 0;}
.pickup-box-title{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.45rem;}
.pickup-box-body{font-size:12.5px;line-height:1.8;color:var(--muted);}
.disclaimer{border-left:2px solid var(--gold);padding:.9rem 1.1rem;background:rgba(201,160,80,0.04);margin:1.25rem 0;}
.disclaimer p{font-size:11.5px;line-height:1.85;color:var(--deep);font-style:italic;}
.check-row{display:flex;gap:.75rem;align-items:flex-start;cursor:pointer;margin:.9rem 0;user-select:none;}
.check-box{width:17px;height:17px;min-width:17px;border:1px solid rgba(201,160,80,0.45);background:transparent;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s ease;flex-shrink:0;}
.check-box.ticked{background:var(--gold);border-color:var(--gold);}
.check-mark{width:9px;height:6px;border-bottom:1.5px solid #080503;border-left:1.5px solid #080503;transform:rotate(-45deg) translateY(-1px);opacity:0;transition:opacity .15s ease;}
.check-box.ticked .check-mark{opacity:1;}
.check-label{font-size:12px;line-height:1.75;color:var(--muted);letter-spacing:.025em;}
.field{margin-bottom:.9rem;}
.field-label{display:block;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--deep);margin-bottom:.35rem;}
.field-input{width:100%;padding:.72rem 1rem;border:1px solid rgba(201,160,80,0.18);background:rgba(12,8,4,0.6);color:var(--parchment);font-family:'Josefin Sans',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .2s ease;border-radius:0;-webkit-appearance:none;appearance:none;}
.field-input::placeholder{color:rgba(154,138,112,0.35);}
.field-input:focus{border-color:rgba(201,160,80,0.6);}
.field-input.err{border-color:rgba(200,80,60,0.6);}
.field-err{font-size:9.5px;letter-spacing:.1em;color:var(--danger);margin-top:.3rem;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.divider{border:none;border-top:1px solid rgba(201,160,80,0.12);margin:1.5rem 0;}
.section-label{font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);margin-bottom:.85rem;}
.summary-line{display:flex;justify-content:space-between;align-items:baseline;padding:.55rem 0;border-bottom:1px solid rgba(201,160,80,0.07);font-size:13px;}
.summary-line:last-child{border-bottom:none;}
.s-label{color:var(--muted);letter-spacing:.04em;}
.s-val{color:var(--parchment);}
.s-free{color:#7aaa70;}
.summary-total{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 0 .4rem;border-top:1px solid rgba(201,160,80,0.28);margin-top:.4rem;}
.total-lbl{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);}
.total-amt{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold);line-height:1;}
.info-line{font-size:11.5px;color:var(--deep);line-height:1.7;margin-top:.3rem;}
.info-line span{color:var(--muted);}
/* ── PAYMENT SECTION ── */
.payment-section{margin-top:1.25rem;}
.payment-preferred-badge{display:inline-block;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#080503;background:var(--gold);padding:.2rem .5rem;margin-bottom:.6rem;}
.payment-title{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
/* Venmo */
.btn-venmo{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:1.15rem 2rem;border:none;background:#008CFF;color:#fff;font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .25s ease;text-decoration:none;}
.btn-venmo:hover{background:#006fcc;}
/* Venmo name reminder */
.venmo-name-reminder{background:rgba(0,140,255,0.08);border:1px solid rgba(0,140,255,0.25);padding:.75rem 1rem;margin:.6rem 0 0;}
.venmo-name-reminder p{font-size:11.5px;line-height:1.7;color:var(--muted);}
.venmo-name-reminder strong{color:#008CFF;}
/* PayPal divider */
.pay-or{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0 1rem;}
.pay-or-line{flex:1;height:1px;background:rgba(201,160,80,0.12);}
.pay-or-text{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--deep);}
/* PayPal container */
#paypal-btn-container{margin-top:.5rem;}
/* Steps */
.venmo-steps{border:1px solid rgba(201,160,80,0.2);background:rgba(201,160,80,0.04);padding:1.1rem 1.25rem;margin:1.1rem 0;}
.venmo-steps-title{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;}
.venmo-step{display:flex;gap:.75rem;align-items:flex-start;margin-bottom:.55rem;font-size:12.5px;color:var(--muted);line-height:1.6;}
.venmo-step:last-child{margin-bottom:0;}
.venmo-num{width:20px;height:20px;min-width:20px;border:1px solid rgba(201,160,80,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);flex-shrink:0;margin-top:1px;}
/* Confirm */
.btn-confirm{display:block;width:100%;padding:1.05rem 2rem;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;transition:all .28s ease;margin-top:.75rem;}
.btn-confirm:hover:not(:disabled){background:var(--gold);color:#080503;}
.btn-confirm:disabled{opacity:.35;cursor:not-allowed;}
.btn-ghost{display:block;width:100%;padding:.9rem 2rem;border:1px solid rgba(240,230,208,0.12);background:transparent;color:rgba(240,230,208,0.35);font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:all .25s ease;margin-top:.4rem;}
.btn-ghost:hover{border-color:rgba(240,230,208,0.28);color:rgba(240,230,208,0.6);}
.btn-gold{display:block;width:100%;padding:1.05rem 2rem;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;transition:all .28s ease;margin-top:.75rem;}
.btn-gold:hover:not(:disabled){background:var(--gold);color:#080503;}
.btn-gold:disabled{opacity:.28;cursor:not-allowed;}
.back{display:inline-flex;align-items:center;gap:.4rem;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--deep);cursor:pointer;background:none;border:none;padding:0;margin-bottom:1.75rem;transition:color .2s ease;}
.back:hover{color:var(--gold);}
.age-gate{text-align:center;max-width:420px;margin:0 auto;}
.age-brand{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.55em;color:var(--gold);text-transform:uppercase;margin-bottom:4.5rem;display:block;}
.age-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,2.8rem);font-weight:300;line-height:1.18;color:var(--parchment);margin-bottom:.6rem;}
.age-sub{font-size:10px;letter-spacing:.22em;color:var(--deep);text-transform:uppercase;margin-bottom:3.25rem;}
.blocked{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-style:italic;color:var(--deep);padding:3rem 0;}
.alert{font-size:11px;color:var(--danger);letter-spacing:.08em;margin:.5rem 0;padding:.6rem .9rem;border-left:2px solid var(--danger);background:rgba(200,80,60,0.06);}
.sending-msg{font-size:11px;color:var(--muted);letter-spacing:.12em;text-align:center;margin-top:.75rem;animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}
.success-wrap{text-align:center;padding:1rem 0;}
.success-icon{font-size:3rem;margin-bottom:1.5rem;display:block;}
.success-headline{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--parchment);margin-bottom:.5rem;}
.success-sub{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;}
.success-card{border:1px solid rgba(201,160,80,0.2);background:var(--card-bg);padding:1.25rem 1.5rem;text-align:left;}
@media(max-width:580px){.field-row{grid-template-columns:1fr;}.scene{padding:2rem 1rem;}}
</style>
</head>

const FREY_PRICE  = 119;
const MUGEN_PRICE = 50;
const TAX_RATE    = 0.0835;
const SHIPPING    = { 0:0, 1:15, 2:20, 3:25, 4:40 };
const fmt         = n => '$' + Number(n).toFixed(2);
const genOrderId  = () => {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = 'MFR-';
  for (let i = 0; i < 4; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
};

const { useState, useEffect, useRef } = React;

/* ── Stable sub-components (defined outside App) ── */
const Progress = ({ active }) => (
  <div className="progress">
    {[1,2,3,4].map(i => <div key={i} className={`progress-seg${i <= active ? ' active' : ''}`}/>)}
  </div>
);

const Checkbox = ({ checked, onChange, label }) => (
  <div className="check-row" onClick={onChange}>
    <div className={`check-box${checked ? ' ticked' : ''}`}><div className="check-mark"/></div>
    <span className="check-label">{label}</span>
  </div>
);

const Field = ({ label, name, type, placeholder, value, onChange, error }) => (
  <div className="field">
    <label className="field-label">{label}</label>
    <input type={type||'text'} className={`field-input${error?' err':''}`}
      placeholder={placeholder} value={value}
      onChange={e => onChange(name, e.target.value)} autoComplete="off"/>
    {error && <div className="field-err">{error}</div>}
  </div>
);

/* ── App ── */
function App() {
  const [step,       setStep]       = useState(0);
  const [fading,     setFading]     = useState(false);
  const [blocked,    setBlocked]    = useState(false);
  const [freyQty,    setFreyQty]    = useState(null);
  const [mugenQty,   setMugenQty]   = useState(null);
  const [mugenAck,   setMugenAck]   = useState(false);
  const [delivery,   setDelivery]   = useState(null);
  const [info,       setInfo]       = useState({ name:'', email:'', phone:'', street:'', city:'', state:'', zip:'' });
  const [errors,     setErrors]     = useState({});
  const [sending,    setSending]    = useState(false);
  const [venmoOpened, setVenmoOpened] = useState(false);
  const [payConfirmed,setPayConfirmed]= useState(false);
  const [payMethod,  setPayMethod]  = useState(null); // 'venmo' | 'paypal'
  const [orderId,    setOrderId]    = useState(() => genOrderId());
  const ppRendered = useRef(false);

  const freyN    = freyQty  ?? 0;
  const mugenN   = mugenQty ?? 0;
  const pickup   = delivery === 'pickup';
  const freySub  = freyN * FREY_PRICE;
  const freyTax  = freySub * TAX_RATE;
  const mugenSub = mugenN * MUGEN_PRICE;
  const ship     = (freyN > 0 && !pickup) ? (SHIPPING[freyN] || 0) : 0;
  const total    = freySub + freyTax + mugenSub + ship;
  const address  = (!pickup && freyN > 0) ? `${info.street}, ${info.city}, ${info.state} ${info.zip}` : 'Local Pickup';

  // First name + last initial for Venmo note
  const nameParts = info.name.trim().split(' ');
  const venmoName = nameParts.length > 1
    ? `${nameParts[0]} ${nameParts[nameParts.length - 1][0]}.`
    : nameParts[0];

  const go = to => {
    setFading(true);
    setTimeout(() => { setStep(to); setFading(false); window.scrollTo(0,0); }, 360);
  };

  const handleField = (name, value) => {
    setInfo(p => ({...p, [name]: value}));
    setErrors(p => ({...p, [name]: null}));
  };

  const validateInfo = () => {
    const e = {};
    if (!info.name.trim())                 e.name   = 'Required';
    if (!/\S+@\S+\.\S+/.test(info.email)) e.email  = 'Valid email required';
    if (!info.phone.trim())                e.phone  = 'Required';
    if (freyN > 0 && !pickup) {
      if (!info.street.trim()) e.street = 'Required';
      if (!info.city.trim())   e.city   = 'Required';
      if (!info.state.trim())  e.state  = 'Required';
      if (!info.zip.trim())    e.zip    = 'Required';
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const buildVenmoLink = () => {
    const note = encodeURIComponent('Order ' + orderId);
    return 'https://venmo.com/' + VENMO_HANDLE + '?txn=pay&amount=' + total.toFixed(2) + '&note=' + note;
  };

  const submitOrder = async (method) => {
    setSending(true);
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode:   'no-cors',
        body:   JSON.stringify({
          name: info.name, email: info.email, phone: info.phone,
          freyQty: freyN, freySub: freySub.toFixed(2), freyTax: freyTax.toFixed(2),
          mugenQty: mugenN, mugenSub: mugenSub.toFixed(2),
          delivery: delivery || 'pickup', shipping: ship.toFixed(2),
          total: total.toFixed(2), address,
          paymentMethod: method || 'venmo',
          orderId: orderId,
        }),
      });
    } catch (err) { console.warn('Log error:', err); }
    setSending(false);
    go(5);
  };

  /* Render PayPal buttons when step 4 is active */
  useEffect(() => {
    if (step !== 4) { ppRendered.current = false; return; }
    const timer = setTimeout(() => {
      const container = document.getElementById('paypal-btn-container');
      if (!container || ppRendered.current || !window.paypal) return;
      ppRendered.current = true;

      const items = [];
      if (freyN > 0) items.push({ name:`Frey Ranch Wheat Whiskey ×${freyN}`, unit_amount:{value:freySub.toFixed(2),currency_code:'USD'}, quantity:'1', category:'PHYSICAL_GOODS' });
      if (mugenN > 0) items.push({ name:'Mugen Whiskey Pre-Order Deposit', unit_amount:{value:mugenSub.toFixed(2),currency_code:'USD'}, quantity:'1', category:'DIGITAL_GOODS' });

      window.paypal.Buttons({
        style: { layout:'vertical', color:'blue', shape:'rect', label:'pay', height:44 },
        createOrder: (data, actions) => actions.order.create({
          purchase_units: [{
            description: `Mugen×FreyRanch — ${info.name}`,
            custom_id: `FR${freyN}_MG${mugenN}_${delivery||'na'}`,
            amount: {
              value: total.toFixed(2), currency_code:'USD',
              breakdown: {
                item_total: {value:(freySub+mugenSub).toFixed(2), currency_code:'USD'},
                tax_total:  {value:freyTax.toFixed(2),            currency_code:'USD'},
                shipping:   {value:ship.toFixed(2),               currency_code:'USD'},
              },
            },
            items,
            shipping: (!pickup && freyN > 0) ? {
              name: {full_name: info.name},
              address: {address_line_1:info.street, admin_area_2:info.city, admin_area_1:info.state, postal_code:info.zip, country_code:'US'},
            } : undefined,
          }],
          payer: {email_address: info.email},
        }),
        onApprove: (data, actions) => actions.order.capture().then(() => submitOrder('paypal')),
        onError: err => console.error('PayPal error:', err),
      }).render('#paypal-btn-container');
    }, 200);
    return () => clearTimeout(timer);
  }, [step]);

  const renderContent = () => {
    switch (step) {

      case 0: return (
        <div className="age-gate">
          <span className="age-brand">Mugen Whiskey × Frey Ranch</span>
          {blocked ? (
            <p className="blocked">We're sorry — you must be 21 or older to enter this site.</p>
          ) : (
            <>
              <h1 className="age-headline">Are you of legal<br/>drinking age?</h1>
              <p className="age-sub">Must be 21 or older to purchase alcohol</p>
              <button className="btn-gold" onClick={() => go(1)}>Yes — I Am 21 or Older</button>
              <button className="btn-ghost" onClick={() => setBlocked(true)}>No — I Am Under 21</button>
            </>
          )}
        </div>
      );

      case 1: return (
        <>
          <Progress active={1}/>
          <div className="wordmark">Step 1 of 4</div>
          <h1 className="headline">100% Wheat<br/><em>Whiskey</em></h1>
          <p className="subline">Single Estate · Frey Ranch · Fallon, Nevada</p>
          <div className="product-card">
            <div className="product-hero">
              <div className="hero-glow-frey"/>
              <img src={FREY_IMG} alt="Frey Ranch" className="bottle-img"/>
            </div>
            <p className="product-eyebrow">Limited Release</p>
            <p className="product-name">Frey Ranch Wheat Whiskey</p>
            <p className="product-price">$119.00 per bottle · 8.35% sales tax</p>
            <p className="product-desc">A rare, single-estate 100% wheat whiskey grown, distilled, and bottled on Frey Ranch in Fallon, Nevada. Field to glass with no compromises.</p>
            <div className="qty-grid">
              {[
                {qty:0, label:'Skip — No Frey Ranch',  detail:null},
                {qty:1, label:'1 Bottle',               detail:`${fmt(FREY_PRICE)} + $9.94 tax`},
                {qty:2, label:'2 Bottles',              detail:`${fmt(FREY_PRICE*2)} + $19.87 tax`},
                {qty:3, label:'3 Bottles',               detail:`${fmt(FREY_PRICE*3)} + $29.81 tax`},
              {qty:4, label:'4 Bottles',               detail:`${fmt(FREY_PRICE*4)} + $39.74 tax`},
              ].map(({qty,label,detail}) => (
                <button key={qty} className={`qty-btn${freyQty===qty?' qs':''}`}
                  onClick={() => {setFreyQty(qty); if(qty===0) setDelivery(null);}}>
                  <span>{label}</span>
                  <span className="qty-detail">{detail||'—'}</span>
                </button>
              ))}
            </div>
          </div>
          <button className="btn-gold" disabled={freyQty===null} onClick={() => go(2)}>Continue →</button>
          {freyQty===null && <p className="alert">Please select a quantity to continue.</p>}
        </>
      );

      case 2: {
        const needAck      = mugenQty===1 && !mugenAck;
        const noneSelected = freyQty===0 && mugenQty===0;
        const canGo        = mugenQty!==null && !needAck && !noneSelected;
        return (
          <>
            <Progress active={2}/>
            <button className="back" onClick={() => go(1)}>← Back</button>
            <div className="wordmark">Step 2 of 4</div>
            <h1 className="headline">Mugen Whiskey<br/><em>Pre-Order</em></h1>
            <p className="subline">Reserve Your Allocation · $50 Deposit</p>
            <div className="product-card">
              <div className="product-hero" style={{background:'#06060a'}}>
                <div className="hero-glow-mugen"/>
                <img src={MUGEN_IMG} alt="Mugen Whiskey" className="bottle-img"/>
              </div>
              <p className="product-eyebrow">Exclusive Pre-Order</p>
              <p className="product-name">Mugen Whiskey Pre-Order</p>
              <p className="product-price">$50.00 deposit · Applied toward final bottle price</p>
              <p className="product-desc">Secure your spot in an exclusive upcoming Mugen Whiskey release. Final bottle details, pricing, and release date announced ahead of launch.</p>
              <div className="disclaimer">
                <p>The $50 deposit reserves your place for a future allocation. Final bottle name, age, source, release date, final price, and availability are not yet confirmed and are subject to change. The deposit will be applied toward the final purchase price if allocation is fulfilled. If we are unable to fulfill your pre-order, your deposit will be refunded in full.</p>
              </div>
              <div className="qty-grid-2">
                {[{qty:0,label:'Skip'},{qty:1,label:'Reserve One — $50'}].map(({qty,label}) => (
                  <button key={qty} className={`qb2${mugenQty===qty?' qs':''}`}
                    onClick={() => {setMugenQty(qty); if(qty===0) setMugenAck(false);}}>
                    {label}
                  </button>
                ))}
              </div>
              {mugenQty===1 && (
                <Checkbox checked={mugenAck} onChange={() => setMugenAck(p=>!p)}
                  label="I understand the Mugen deposit is for a future release with final details and pricing to be disclosed later. My deposit will be refunded if my allocation cannot be fulfilled."/>
              )}
            </div>
            {noneSelected && mugenQty!==null && <p className="alert">Please select at least one item to continue.</p>}
            <button className="btn-gold" disabled={!canGo} onClick={() => go(3)}>Continue →</button>
            <button className="btn-ghost" onClick={() => go(1)}>← Back</button>
          </>
        );
      }

      case 3: {
        const needDelivery = freyN > 0;
        const canProceed   = !needDelivery || delivery !== null;
        return (
          <>
            <Progress active={3}/>
            <button className="back" onClick={() => go(2)}>← Back</button>
            <div className="wordmark">Step 3 of 4</div>
            <h1 className="headline">Your<br/><em>Details</em></h1>
            <p className="subline">Contact &amp; delivery information</p>
            <div className="product-card">
              <p className="section-label">Contact</p>
              <Field label="Full Name"     name="name"  type="text"  placeholder="Your full name"   value={info.name}  onChange={handleField} error={errors.name}/>
              <Field label="Email Address" name="email" type="email" placeholder="you@email.com"     value={info.email} onChange={handleField} error={errors.email}/>
              <Field label="Phone Number"  name="phone" type="tel"   placeholder="+1 (000) 000-0000" value={info.phone} onChange={handleField} error={errors.phone}/>
              {needDelivery && (
                <>
                  <hr className="divider"/>
                  <p className="section-label">How would you like to receive your bottles?</p>
                  <div className="delivery-grid">
                    <button className={`dbtn${delivery==='ship'?' qs':''}`} onClick={() => setDelivery('ship')}>
                      <span className="dbtn-icon">📦</span>
                      <span className="dbtn-label">Ship to Me</span>
                      <span className="dbtn-sub">Nationwide shipping</span>
                    </button>
                    <button className={`dbtn${delivery==='pickup'?' qs':''}`} onClick={() => setDelivery('pickup')}>
                      <span className="dbtn-icon">🤝</span>
                      <span className="dbtn-label">Local Pickup</span>
                      <span className="dbtn-sub">Las Vegas · Free</span>
                    </button>
                  </div>
                  {delivery==='pickup' && (
                    <div className="pickup-box">
                      <p className="pickup-box-title">📍 Las Vegas Local Pickup</p>
                      <p className="pickup-box-body">No shipping charge. After your order is placed, <strong style={{color:'var(--gold)',fontWeight:600}}>Filipe</strong> will personally reach out via phone or email to arrange a convenient pickup time and location.</p>
                    </div>
                  )}
                  {delivery==='ship' && (
                    <>
                      <hr className="divider"/>
                      <p className="section-label">Shipping Address</p>
                      <Field label="Street Address" name="street" placeholder="123 Main Street"  value={info.street} onChange={handleField} error={errors.street}/>
                      <div className="field-row">
                        <Field label="City"  name="city"  placeholder="Your city" value={info.city}  onChange={handleField} error={errors.city}/>
                        <Field label="State" name="state" placeholder="NV"        value={info.state} onChange={handleField} error={errors.state}/>
                      </div>
                      <Field label="ZIP Code" name="zip" placeholder="89101" value={info.zip} onChange={handleField} error={errors.zip}/>
                    </>
                  )}
                </>
              )}
            </div>
            <button className="btn-gold" style={{marginTop:'1rem'}} disabled={!canProceed}
              onClick={() => {if(validateInfo()) go(4);}}>
              Review My Order →
            </button>
            {needDelivery && !delivery && <p className="alert">Please choose a delivery method above.</p>}
            <button className="btn-ghost" onClick={() => go(2)}>← Back</button>
          </>
        );
      }

      case 4: return (
        <>
          <Progress active={4}/>
          <button className="back" onClick={() => { ppRendered.current=false; setVenmoOpened(false); setPayConfirmed(false); go(3); }}>← Back</button>
          <div className="wordmark">Step 4 of 4</div>
          <h1 className="headline">Order<br/><em>Summary</em></h1>
          <p className="subline">Review &amp; complete payment below</p>

          <div className="product-card">
            <p className="section-label">Items Ordered</p>
            {freyN > 0 && (
              <>
                <div className="summary-line"><span className="s-label">Frey Ranch × {freyN} bottle{freyN>1?'s':''}</span><span className="s-val">{fmt(freySub)}</span></div>
                <div className="summary-line"><span className="s-label">Sales Tax (8.35%)</span><span className="s-val">{fmt(freyTax)}</span></div>
                <div className="summary-line">
                  <span className="s-label">{pickup?'Shipping — Local Pickup':`Shipping (${freyN} bottle${freyN>1?'s':''})`}</span>
                  <span className={pickup?'s-free':'s-val'}>{pickup?'FREE':fmt(ship)}</span>
                </div>
              </>
            )}
            {mugenN > 0 && (
              <div className="summary-line"><span className="s-label">Mugen Pre-Order Deposit</span><span className="s-val">{fmt(mugenSub)}</span></div>
            )}
            <div className="summary-total">
              <span className="total-lbl">Total Due Today</span>
              <span className="total-amt">{fmt(total)}</span>
            </div>
            <hr className="divider"/>
            <p className="section-label">{pickup?'Pickup Details':'Delivering To'}</p>
            <p className="info-line"><span>Order ID: </span><strong style={{color:'var(--gold)'}}>{orderId}</strong></p>
            <p className="info-line"><span>Name: </span>{info.name}</p>
            <p className="info-line"><span>Email: </span>{info.email}</p>
            <p className="info-line"><span>Phone: </span>{info.phone}</p>
            {freyN>0&&pickup  && <p className="info-line"><span>Method: </span>Las Vegas Local Pickup — Filipe will reach out to arrange</p>}
            {freyN>0&&!pickup && <p className="info-line"><span>Ship to: </span>{address}</p>}
            {mugenN>0 && (
              <>
                <hr className="divider"/>
                <p style={{fontSize:'11px',color:'var(--deep)',fontStyle:'italic',lineHeight:'1.75'}}>Mugen deposit is applied toward your final bottle price. Release details communicated by email.</p>
              </>
            )}
          </div>

          {/* ── PAYMENT ── */}
          <div className="payment-section">

            {/* VENMO — preferred */}
            <span className="payment-preferred-badge">⭐ Preferred — No Fees</span>
            <p className="payment-title" style={{marginTop:'.4rem'}}>Pay with Venmo</p>
            <a className="btn-venmo" href={buildVenmoLink()} target="_blank" rel="noopener noreferrer"
              onClick={() => { setVenmoOpened(true); }}>
              💙&nbsp; Pay {fmt(total)} via Venmo
            </a>

            {/* Order ID reminder */}
            <div className="venmo-name-reminder" style={{marginBottom:'1rem'}}>
              <p>📝 The note is pre-filled with order ID <strong>{orderId}</strong>. Please do not change it — it's how we match your payment.</p>
            </div>

            {/* LOCKED: show placeholder until Venmo is opened */}
            {!venmoOpened && (
              <div style={{textAlign:'center',padding:'1rem',border:'1px solid rgba(201,160,80,0.12)',background:'rgba(201,160,80,0.03)',borderRadius:0}}>
                <p style={{fontSize:'11px',color:'var(--deep)',letterSpacing:'.14em',textTransform:'uppercase'}}>
                  🔒 Complete your Venmo payment first
                </p>
                <p style={{fontSize:'10px',color:'var(--deep)',opacity:.5,marginTop:'.35rem',letterSpacing:'.06em'}}>
                  The confirmation checkbox will appear here once you tap Pay above
                </p>
              </div>
            )}

            {/* UNLOCKED: checkbox + confirm button appear after Venmo link clicked */}
            {venmoOpened && (
              <>
                <div className="check-row"
                  style={{padding:'.8rem .9rem',border:'1px solid rgba(201,160,80,0.28)',background:'rgba(201,160,80,0.05)'}}
                  onClick={() => setPayConfirmed(p => !p)}>
                  <div className={`check-box${payConfirmed ? ' ticked' : ''}`}><div className="check-mark"/></div>
                  <span className="check-label">
                    I confirm I have sent <strong style={{color:'var(--gold)'}}>{fmt(total)}</strong> to{' '}
                    <strong style={{color:'var(--gold)'}}>@noblepalatesociety</strong> on Venmo with note{' '}
                    <strong style={{color:'var(--gold)'}}>{orderId}</strong>.
                  </span>
                </div>
                <button className="btn-confirm"
                  disabled={!payConfirmed || sending}
                  onClick={() => submitOrder('venmo')}>
                  {sending ? '⏳  Logging your order...' : '✓   Complete My Order'}
                </button>
                {sending && <p className="sending-msg">Saving your order &amp; notifying Filipe…</p>}
              </>
            )}

            {/* PAYPAL — secondary */}
            <div className="pay-or">
              <div className="pay-or-line"/>
              <span className="pay-or-text">Or pay with PayPal</span>
              <div className="pay-or-line"/>
            </div>
            <p style={{fontSize:'11px',color:'var(--deep)',letterSpacing:'.06em',marginBottom:'.75rem',textAlign:'center'}}>
              PayPal confirms automatically — no extra step needed.
            </p>
            <div id="paypal-btn-container"/>
          </div>

          <button className="btn-ghost" style={{marginTop:'1.25rem'}} onClick={() => { ppRendered.current=false; setVenmoOpened(false); setPayConfirmed(false); go(3); }}>← Back</button>
        </>
      );

      case 5: return (
        <div className="success-wrap">
          <span className="success-icon">✦</span>
          <h1 className="success-headline">Order Received</h1>
          <p className="success-sub">Thank you, {info.name.split(' ')[0]}</p>
          <div className="success-card">
            <p className="section-label">What Happens Next</p>
            <div className="venmo-step" style={{marginBottom:'.75rem'}}>
              <div className="venmo-num">1</div>
              <span style={{color:'var(--muted)'}}>Filipe has been notified at filipe@noblepalate.com and will confirm your payment within 24 hours.</span>
            </div>
            {freyN>0&&pickup && (
              <div className="venmo-step" style={{marginBottom:'.75rem'}}>
                <div className="venmo-num">2</div>
                <span style={{color:'var(--muted)'}}>He'll contact you at {info.phone} or {info.email} to arrange your Las Vegas pickup.</span>
              </div>
            )}
            {freyN>0&&!pickup && (
              <div className="venmo-step" style={{marginBottom:'.75rem'}}>
                <div className="venmo-num">2</div>
                <span style={{color:'var(--muted)'}}>Your Frey Ranch bottle{freyN>1?'s':''} will be shipped to {info.street}, {info.city}, {info.state}.</span>
              </div>
            )}
            {mugenN>0 && (
              <div className="venmo-step" style={{marginBottom:'.75rem'}}>
                <div className="venmo-num">{freyN>0?'3':'2'}</div>
                <span style={{color:'var(--muted)'}}>Your Mugen allocation is reserved. Release details will be sent to {info.email}.</span>
              </div>
            )}
            <hr className="divider"/>
            <p className="info-line"><span>Order ID: </span><strong style={{color:'var(--gold)'}}>{orderId}</strong></p>
            <p className="info-line"><span>Order Total: </span>{fmt(total)}</p>
            <p className="info-line"><span>Confirmation: </span>{info.email}</p>
          </div>
        </div>
      );

      default: return null;
    }
  };

  return (
    <div className="scene">
      <div className="scene-bg"/>
      <div className="scene-overlay"/>
      
      <div className={`step${fading?' fade-out':' fade-in'}`}>
        {renderContent()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
